<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid 1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="grid-container">
        <header class="header">
            <div class="logo">logo</div>
            <nav class="nav">
                <ul class="menu">
                    <a href="#">INICIO</a>
                    <a href="#">CIENTES</a>
                    <a href="#">CATALOGO</a>
                    <a href="#">CONTACTO</a>
                </ul>
            </nav>
            <div class="search">search</div>
            <div class="user">USER</div>
        </header>
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li class="menu-item">home</li>
                <li class="menu-item">analytics</li>
                <li class="menu-item">sales</li>
                <li class="menu-item">settings</li>
            </ul>
        </aside>                
        <main class="main-content">
            <div class="kpi-grid">
                <div class="card">k1</div>
                <div class="card">k2</div>
                <div class="card">k3</div>
                <div class="card">k4</div>
            </div>
            <div class="chart-principal">chart principal</div>
            <div class="tabla">
                <table>
                    <thead>
                        <tr>
                            <th>1</th>
                            <th>2</th>
                            <th>3</th>
                            <th>4</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>dato 1</td>
                            <td>dato 2</td>
                            <td>dato 3</td>
                            <td>dato 4</td>
                        </tr>
                        <tr>
                            <td>dato 2-1</td>
                            <td>dato 2-2</td>
                            <td>dato 2-3</td>
                            <td>dato 2-4</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mini-card">
                <div class="minicard">mini card 1</div>
                <div class="minicard">mini card 2</div>
            </div>
        </main>
        <div class="panel">
            activity log
        </div>
    </div>
    <footer class="footer">Pie de pagina</footer>
</body>
</html>
